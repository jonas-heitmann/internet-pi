---
# Location where configuration files will be stored.
config_dir: '~'

# Domain names configuration (related services need to be enabled).
domain_name_enable: true
domain_name: 'home.local'
domain_pihole: 'pihole'          # to access pihole via: http://pihole.home.local
domain_grafana: 'grafana'        # to access grafana via: http://grafana.home.local
domain_prometheus: 'prometheus'  # to access prometheus via: http://prometheus.home.local

# Pi-hole configuration.
pihole_enable: true
pihole_hostname: internetpi
pihole_timezone: Europe/Berlin
pihole_password: "change-this-password"

# Internet monitoring configuration.
monitoring_enable: true
monitoring_grafana_admin_password: "change-this-password"
monitoring_speedtest_interval: 60m
monitoring_ping_interval: 5s
monitoring_ping_hosts:  # [URL];[HUMAN_READABLE_NAME]
  - http://www.google.com/;google.com
  - https://github.com/;github.com
  - https://www.apple.com/;apple.com

# Prometheus configuration.
prometheus_monitor_prometheus: false
prometheus_node_exporter_targets:
  - 'nodeexp:9100'
prometheus_extra_scrape_configs: ''
prometheus_tsdb_retention_time: 90d

# Shelly Plug configuration. (Also requires `monitoring_enable`)
shelly_plug_enable: false
shelly_plug_hostname: my-shelly-plug-host-or-ip
shelly_plug_http_username: username
shelly_plug_http_password: "password"

# AirGradient configuration. (Also requires `monitoring_enable`)
airgradient_enable: false
airgradient_sensors:
  # ID Should be limited to no more than 38 characters, in the set a-z.
  - id: livingroom
    ip: "192.168.0.123"
    port: 9925

# Starlink configuration. (Also requires `monitoring_enable`)
starlink_enable: false

# SMB-Server configuration
smb_enable: true

# Backup configuration.
# Backs up Pi-hole and Grafana/Prometheus data to an FTP server (e.g. a NAS).
# Passwords with double-quote (") characters must be escaped as \".
backup_enable: true
backup_ftp_host: "nas.home.local"
backup_ftp_port: 21
backup_ftp_user: "backup"
backup_ftp_password: "change-this-password"
backup_ftp_path: "/internet-pi"
backup_ftp_tls_verify: true
# Optional: path to the issuing CA certificate (PEM/CRT) on the Ansible control
# machine. The playbook installs it into the Pi's trust store so lftp accepts the
# FTPS certificate. Example: "files/backup-ftp-ca.crt"
backup_ftp_ca_cert_src: ""

# Optional: also upload backups to an SMB share.
backup_smb_enable: false
backup_smb_share: "//nas.home.local/backups"
backup_smb_path: "internet-pi"
backup_smb_user: "backup"
backup_smb_password: "change-this-password"

# Number of daily backups to keep on the remote storage.
backup_retention_days: 7

# Schedule for the automatic daily backup (cron syntax).
backup_cron_hour: "2"
backup_cron_minute: "0"

# Set to true to automatically restore the latest backup when running main.yml
# on a new server. Requires backup_enable: true and valid FTP credentials.
backup_restore_on_setup: false
