---
- name: Ensure vsftpd is installed
  ansible.builtin.apt:
    name: vsftpd
    state: present
    update_cache: true

- name: Ensure openssh-server is installed
  ansible.builtin.apt:
    name: openssh-server
    state: present
    update_cache: true

- name: Create secure chroot dir for vsftpd
  ansible.builtin.file:
    path: /var/run/vsftpd/empty
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Ensure FTP user exists with login shell and password
  ansible.builtin.user:
    name: ftpuser
    password: "{{ 'secure_password' | password_hash('sha512') }}"
    home: /srv/ftp
    shell: /bin/bash
    create_home: true

- name: Ensure SFTP-only user exists
  ansible.builtin.user:
    name: sftpuser
    password: "{{ 'secure_password' | password_hash('sha512') }}"
    home: /srv/ftp
    shell: /usr/sbin/nologin
    create_home: false

- name: Ensure sftpuser cannot write to chroot base (required by sshd)
  ansible.builtin.file:
    path: /srv/ftp
    state: directory
    owner: root
    group: root
    mode: '755'

- name: Create writable directory for sftpuser inside chroot
  ansible.builtin.file:
    path: /srv/ftp/upload
    state: directory
    owner: sftpuser
    group: sftpuser
    mode: '755'

- name: Ensure Subsystem sftp is set to internal-sftp
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^Subsystem\\s+sftp'
    line: 'Subsystem sftp internal-sftp'
    state: present
  notify: Restart ssh

- name: Ensure SSH password authentication is enabled
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication yes'
    state: present
  notify: Restart ssh

- name: Ensure SSH public key authentication is enabled
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PubkeyAuthentication'
    line: 'PubkeyAuthentication yes'
    state: present
  notify: Restart ssh

- name: Add SFTP-only config to sshd_config
  ansible.builtin.blockinfile:
    path: /etc/ssh/sshd_config
    marker: "# {mark} ANSIBLE MANAGED BLOCK sftpuser"
    block: |
      Match User sftpuser
        ChrootDirectory /srv/ftp
        ForceCommand internal-sftp
        AllowTCPForwarding no
        X11Forwarding no
  notify: Restart ssh

- name: Deploy updated vsftpd.conf with secure_chroot_dir
  ansible.builtin.copy:
    dest: /etc/vsftpd.conf
    content: |
      listen=YES
      anonymous_enable=NO
      local_enable=YES
      write_enable=YES
      chroot_local_user=YES
      allow_writeable_chroot=YES
      secure_chroot_dir=/var/run/vsftpd/empty
      local_umask=022
      user_sub_token=$USER
      local_root=/srv/ftp
      pasv_min_port=10000
      pasv_max_port=10100
      pasv_enable=YES
      pam_service_name=vsftpd
      userlist_enable=YES
      userlist_file=/etc/vsftpd.userlist
      userlist_deny=NO
    owner: root
    group: root
    mode: '0644'
  notify: Restart vsftpd

- name: Add FTP user to allowed list (idempotent)
  ansible.builtin.lineinfile:
    path: /etc/vsftpd.userlist
    line: ftpuser
    create: true
    state: present
    mode: '0644'

- name: Ensure vsftpd is enabled and started
  ansible.builtin.service:
    name: vsftpd
    state: started
    enabled: true
